<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🥋 BJJ Training Log</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --primary: #8B0000;
            --primary-dark: #660000;
            --secondary: #2c3e50;
            --text: #1a1a1a;
            --text-muted: #6c757d;
            --border: #dee2e6;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --belt-white: #f8f9fa;
            --belt-blue: #e3f2fd;
            --belt-purple: #f3e5f5;
            --belt-brown: #efebe9;
            --belt-black: #212121;
            --radius: 16px;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card: #1e1e1e;
            --primary: #ff6b6b;
            --primary-dark: #ee5a5a;
            --secondary: #adb5bd;
            --text: #f8f9fa;
            --text-muted: #adb5bd;
            --border: #333;
            --belt-white: #2d2d2d;
            --belt-blue: #1a3a5c;
            --belt-purple: #3a2a4a;
            --belt-brown: #3a322a;
            --belt-black: #000;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 12px;
            font-size: 15px;
            transition: background 0.3s, color 0.3s;
        }

        .container { max-width: 650px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0 16px;
            padding: 8px 4px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        h1 { 
            font-size: 1.5rem; 
            font-weight: 700; 
            letter-spacing: -0.3px;
        }
        
        .belt-indicator { display: flex; gap: 3px; }
        .belt-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid var(--border); }
        .belt-dot.active { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary); }

        .streak-badge {
            background: linear-gradient(135deg, #ff9a56, #ff6b6b);
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(255,107,107,0.3);
        }

        .controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 0; }
        label { font-size: 0.8rem; font-weight: 500; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
        
        input, select, textarea {
            width: 100%; padding: 12px 14px;
            border: 1px solid var(--border); border-radius: 12px;
            font-size: 0.95rem; background: var(--card); color: var(--text);
            transition: border 0.2s, box-shadow 0.2s;
        }
        textarea { min-height: 70px; resize: vertical; }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.15);
        }

        .btn {
            padding: 12px 16px; border: none; border-radius: 12px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            transition: transform 0.1s, opacity 0.2s; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 10px 14px; font-size: 0.9rem; }
        .btn-sm { padding: 6px 10px; font-size: 0.8rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; min-width: 36px; }
        .btn-edit { background: rgba(0,122,255,0.15); color: #007AFF; }
        .btn-del { background: rgba(220,53,69,0.15); color: var(--danger); }
        .btn-star { background: transparent; color: var(--warning); font-size: 1.1rem; }
        .btn-star.active { color: #ffcc00; text-shadow: 0 0 2px rgba(0,0,0,0.2); }

        .card {
            background: var(--card); border-radius: var(--radius);
            padding: 14px; box-shadow: var(--shadow); margin-bottom: 12px;
            border-left: 4px solid var(--primary);
        }
        .card.guard { border-left-color: #4a90e2; }
        .card.pass { border-left-color: #e67e22; }
        .card.submission { border-left-color: #e74c3c; }
        .card.sweep { border-left-color: #2ecc71; }
        .card.defense { border-left-color: #9b59b6; }
        .card.takedown { border-left-color: #1abc9c; }

        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .stat-card { background: var(--card); border-radius: 12px; padding: 10px 12px; text-align: center; box-shadow: var(--shadow); font-size: 0.85rem; }
        .stat-value { font-size: 1.3rem; font-weight: 700; color: var(--primary); display: block; margin: 2px 0; }
        .stat-label { color: var(--text-muted); font-size: 0.75rem; }

        .view-toggles { display: flex; gap: 8px; margin-bottom: 12px; justify-content: center; }
        .view-toggle.active { background: var(--primary); color: white; border-color: var(--primary); }

        .entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
        .entry-date { font-weight: 600; color: var(--secondary); font-size: 0.9rem; }
        .entry-category { background: rgba(139, 0, 0, 0.1); color: var(--primary); padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .entry-title { font-weight: 700; font-size: 1.05rem; margin: 4px 0 6px; line-height: 1.3; }
        .entry-notes { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 6px; white-space: pre-wrap; }
        .entry-meta { display: flex; gap: 12px; font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; flex-wrap: wrap; align-items: center; }
        .entry-actions { display: flex; gap: 6px; margin-top: 8px; justify-content: flex-end; }
        .video-link { display: inline-flex; align-items: center; gap: 4px; color: var(--primary); text-decoration: none; font-size: 0.85rem; font-weight: 500; padding: 4px 8px; background: rgba(139,0,0,0.08); border-radius: 6px; margin-top: 6px; }
        .video-link:hover { background: rgba(139,0,0,0.15); }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .calendar-header h3 { margin: 0; font-size: 1.1rem; }
        .calendar-header button { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; cursor: pointer; color: var(--text); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .calendar-day { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 6px 2px; text-align: center; min-height: 65px; cursor: pointer; position: relative; transition: transform 0.1s, box-shadow 0.2s; }
        .calendar-day:active { transform: scale(0.95); }
        .calendar-day.empty { background: transparent; border: none; cursor: default; }
        .calendar-day.today { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(139,0,0,0.2); }
        .calendar-day.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .calendar-day .day-num { font-weight: 700; font-size: 0.85rem; margin-bottom: 2px; }
        .day-dots { display: flex; justify-content: center; gap: 2px; flex-wrap: wrap; margin-top: 2px; }
        .day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--primary); }
        .day-dot.has-video { background: #ff4444; }
        .day-count { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }
        .calendar-day.selected .day-count { color: rgba(255,255,255,0.8); }

        .search-bar { margin: 8px 0 12px; position: relative; }
        .search-bar input { padding-left: 36px; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1rem; pointer-events: none; }
        .filter-chips { display: flex; gap: 6px; margin: 8px 0 12px; flex-wrap: wrap; }
        .chip { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; background: var(--card); border: 1px solid var(--border); color: var(--text); cursor: pointer; transition: all 0.2s; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .clear-filter { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 12px; padding: 8px 12px; background: rgba(139,0,0,0.1); border-radius: 8px; font-size: 0.85rem; color: var(--primary); cursor: pointer; }
        .empty { text-align: center; padding: 28px 20px; color: var(--text-muted); font-size: 0.95rem; }
        .empty-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.7; }

        .quick-add { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow); }
        .quick-add-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-weight: 600; color: var(--secondary); flex-wrap: wrap; gap: 8px; }
        .technique-suggestions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .suggestion { background: rgba(139, 0, 0, 0.08); color: var(--primary); padding: 4px 10px; border-radius: 16px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
        .suggestion:hover { background: var(--primary); color: white; }

        .toast { position: fixed; bottom: 20px; left: 12px; right: 12px; background: var(--card); color: var(--text); padding: 12px 18px; border-radius: 14px; text-align: center; font-weight: 500; transform: translateY(100px); transition: transform 0.3s cubic-bezier(0.2,0,0,1); z-index: 1000; box-shadow: 0 8px 25px rgba(0,0,0,0.15); border-left: 4px solid var(--success); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .toast.show { transform: translateY(0); }
        .toast.error { border-left-color: var(--danger); }
        .toast.info { border-left-color: var(--primary); }

        .theme-toggle { background: none; border: none; font-size: 1.3rem; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text); transition: background 0.2s; }
        .theme-toggle:hover { background: rgba(0,0,0,0.08); }
        [data-theme="dark"] .theme-toggle:hover { background: rgba(255,255,255,0.1); }

        @media (max-width: 400px) {
            h1 { font-size: 1.35rem; }
            .btn { padding: 14px; font-size: 1rem; }
            .stats-bar { grid-template-columns: 1fr; }
            .entry-meta { flex-direction: column; gap: 4px; }
            .calendar-day { min-height: 55px; padding: 4px 2px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>🥋 BJJ Training Log</h1>
                <div class="belt-indicator" id="beltIndicator">
                    <div class="belt-dot" data-belt="white"></div>
                    <div class="belt-dot" data-belt="blue"></div>
                    <div class="belt-dot" data-belt="purple"></div>
                    <div class="belt-dot" data-belt="brown"></div>
                    <div class="belt-dot" data-belt="black"></div>
                </div>
                <span class="streak-badge" id="streakBadge" style="display:none;">🔥 <span id="streakCount">0</span> days</span>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
        </header>

        <!-- Stats Summary -->
        <div class="stats-bar">
            <div class="stat-card"><span class="stat-value" id="totalSessions">0</span><span class="stat-label">Sessions</span></div>
            <div class="stat-card"><span class="stat-value" id="totalTechniques">0</span><span class="stat-label">Techniques</span></div>
            <div class="stat-card"><span class="stat-value" id="avgRating">-</span><span class="stat-label">Avg. Mastery</span></div>
        </div>

        <!-- Quick Add Form -->
        <div class="quick-add">
            <div class="quick-add-title">
                <span>➕ Log Today's Training</span>
                <button class="btn-outline" style="width:auto;padding:6px 12px;font-size:0.85rem;" onclick="setToday()">📅 Today</button>
            </div>
            <form id="logForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="editId">
                <div style="display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap;">
                    <div class="input-group" style="flex:2;">
                        <label for="date">📅 Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="input-group" style="flex:1.5;">
                        <label for="category">🎯 Category</label>
                        <select id="category" required>
                            <option value="guard">🛡️ Guard</option>
                            <option value="pass">🚪 Guard Pass</option>
                            <option value="submission">🔒 Submission</option>
                            <option value="sweep">🔄 Sweep</option>
                            <option value="defense">🛡️ Defense</option>
                            <option value="takedown">🤼 Takedown</option>
                            <option value="other">✨ Other</option>
                        </select>
                    </div>
                </div>
                <div class="input-group" style="margin-bottom:10px;">
                    <label for="technique">🥋 Technique Name</label>
                    <input type="text" id="technique" placeholder="e.g., Spider Guard Sweep, Armbar from Mount" required autocomplete="off" list="techniqueList">
                    <datalist id="techniqueList"></datalist>
                </div>
                <div class="input-group" style="margin-bottom:10px;">
                    <label for="notes">📝 Notes / Details</label>
                    <textarea id="notes" placeholder="What worked? What to improve? Partner tips?"></textarea>
                </div>
                <div class="input-group" style="margin-bottom:10px;">
                    <label for="videoLink">🎥 Video Link (optional)</label>
                    <input type="url" id="videoLink" placeholder="https://youtube.com/..." inputmode="url">
                </div>
                <div style="display:flex; gap:10px; margin-bottom:12px; align-items:center; flex-wrap:wrap;">
                    <div class="input-group" style="flex:1;">
                        <label for="partner">🤝 Training Partner</label>
                        <input type="text" id="partner" placeholder="Optional">
                    </div>
                    <div class="input-group" style="flex:1;">
                        <label>⭐ Mastery Level</label>
                        <div class="rating" id="ratingInput">
                            <button type="button" class="btn-sm btn-star" data-rating="1">☆</button>
                            <button type="button" class="btn-sm btn-star" data-rating="2">☆</button>
                            <button type="button" class="btn-sm btn-star" data-rating="3">☆</button>
                            <button type="button" class="btn-sm btn-star" data-rating="4">☆</button>
                            <button type="button" class="btn-sm btn-star" data-rating="5">☆</button>
                        </div>
                    </div>
                </div>
                <input type="hidden" id="ratingValue" value="3">
                <button type="submit" class="btn btn-primary" id="submitBtn">💾 Save Technique</button>
            </form>
            <div class="technique-suggestions" id="suggestions" style="display:none;"></div>
        </div>

        <!-- View Toggles -->
        <div class="view-toggles">
            <button class="btn btn-outline view-toggle active" data-view="list" onclick="switchView('list')">📋 List View</button>
            <button class="btn btn-outline view-toggle" data-view="calendar" onclick="switchView('calendar')">📅 Calendar View</button>
        </div>

        <!-- Search & Filters -->
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search techniques, notes, partners..." oninput="renderEntries()">
        </div>
        <div class="filter-chips">
            <div class="chip active" data-filter="all">All</div>
            <div class="chip" data-filter="guard">Guard</div>
            <div class="chip" data-filter="submission">Submissions</div>
            <div class="chip" data-filter="thisweek">This Week</div>
            <div class="chip" data-filter="favorites">⭐ Favorites</div>
        </div>

        <!-- Entries Container -->
        <div id="entriesContainer">
            <div class="empty" id="emptyState">
                <div class="empty-icon">🥋</div>
                <p>No techniques logged yet.<br>Start your journey by adding your first technique above!</p>
            </div>
            <div id="entriesList"></div>
        </div>

        <!-- Calendar View Container -->
        <div id="calendarView" style="display:none;">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)">◀</button>
                <h3 id="calendarTitle">Month Year</h3>
                <button onclick="changeMonth(1)">▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <!-- Actions -->
        <div style="display:flex; gap:10px; margin:16px 0;">
            <button class="btn btn-outline" onclick="exportCSV()">📥 Export to CSV</button>
            <button class="btn btn-outline" onclick="clearAllData()" style="border-color:var(--danger);color:var(--danger);">🗑️ Clear All</button>
        </div>
        <p style="text-align:center; color:var(--text-muted); font-size:0.8rem; margin-top:8px; padding-bottom:24px;">
            Data saved locally • OSSU! 🤙
        </p>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let entries = [];
        let currentBelt = 'white';
        let currentRating = 3;
        let currentView = 'list';
        let calendarDate = new Date();
        let selectedDateFilter = null;
        
        const KEY = 'bjj_training_log_v2';
        const BELT_ORDER = ['white', 'blue', 'purple', 'brown', 'black'];
        const CATEGORIES = {
            guard: { label: 'Guard', color: '#4a90e2' },
            pass: { label: 'Guard Pass', color: '#e67e22' },
            submission: { label: 'Submission', color: '#e74c3c' },
            sweep: { label: 'Sweep', color: '#2ecc71' },
            defense: { label: 'Defense', color: '#9b59b6' },
            takedown: { label: 'Takedown', color: '#1abc9c' },
            other: { label: 'Other', color: '#95a5a6' }
        };

        function init() {
            const saved = localStorage.getItem(KEY);
            if (saved) {
                const parsed = JSON.parse(saved);
                entries = parsed.entries || [];
                currentBelt = parsed.belt || 'white';
            }
            
            setToday();
            setupEventListeners();
            updateBeltIndicator();
            applySavedTheme();
            renderEntries();
            updateStats();
            updateTechniqueDatalist();
        }

        function setupEventListeners() {
            document.querySelectorAll('#ratingInput .btn-star').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentRating = parseInt(e.currentTarget.dataset.rating);
                    document.getElementById('ratingValue').value = currentRating;
                    updateRatingUI(currentRating);
                });
            });
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.querySelectorAll('.chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    renderEntries();
                });
            });
            document.getElementById('technique').addEventListener('input', updateSuggestions);
        }

        function applySavedTheme() {
            const savedTheme = localStorage.getItem('bjj_theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeToggle').textContent = '☀️';
            }
        }

        function setToday() {
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
        }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('bjj_theme', newTheme);
        }

        function updateBeltIndicator() {
            const dots = document.querySelectorAll('.belt-dot');
            const currentIndex = BELT_ORDER.indexOf(currentBelt);
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i <= currentIndex);
                dot.style.background = i <= currentIndex ? `var(--belt-${BELT_ORDER[i]})` : 'transparent';
            });
            updateStreakBadge();
        }

        function updateStreakBadge() {
            if (entries.length === 0) return document.getElementById('streakBadge').style.display = 'none';
            
            const dates = [...new Set(entries.map(e => e.date))].sort().reverse();
            let streak = 0;
            const today = new Date(); today.setHours(0,0,0,0);
            
            for (const d of dates) {
                const entryDate = new Date(d + 'T00:00:00');
                entryDate.setHours(0,0,0,0);
                const diff = Math.floor((today - entryDate) / (1000*60*60*24));
                if (diff === streak || diff === streak + 1) streak++;
                else break;
            }
            
            const badge = document.getElementById('streakBadge');
            if (streak >= 2) {
                document.getElementById('streakCount').textContent = streak;
                badge.style.display = 'inline-flex';
            } else {
                badge.style.display = 'none';
            }
        }

        function updateRatingUI(rating) {
            document.querySelectorAll('#ratingInput .btn-star').forEach((btn, i) => {
                const starRating = i + 1;
                btn.textContent = starRating <= rating ? '★' : '☆';
                btn.classList.toggle('active', starRating <= rating);
            });
        }

        function updateSuggestions() {
            const query = document.getElementById('technique').value.toLowerCase().trim();
            const el = document.getElementById('suggestions');
            if (query.length < 2) return el.style.display = 'none';
            
            const matches = [...new Set(entries.filter(e => e.technique.toLowerCase().includes(query)).map(e => e.technique))].slice(0, 5);
            if (matches.length === 0) return el.style.display = 'none';
            
            el.innerHTML = matches.map(t => `<div class="suggestion" onclick="useSuggestion('${escapeHtml(t)}')">${escapeHtml(t)}</div>`).join('');
            el.style.display = 'flex';
        }

        function useSuggestion(technique) {
            document.getElementById('technique').value = technique;
            document.getElementById('suggestions').style.display = 'none';
            document.getElementById('notes').focus();
        }

        function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const date = document.getElementById('date').value;
            const category = document.getElementById('category').value;
            const technique = document.getElementById('technique').value.trim();
            const notes = document.getElementById('notes').value.trim();
            const partner = document.getElementById('partner').value.trim();
            const videoLink = document.getElementById('videoLink').value.trim();
            const rating = parseInt(document.getElementById('ratingValue').value) || 3;
            
            if (!date || !technique) return toast('Please fill in date and technique name', 'error');
            
            const entry = { id: id || Date.now().toString(), date, category, technique, notes, partner, videoLink, rating, timestamp: new Date().toISOString() };
            
            if (id) {
                const idx = entries.findIndex(x => x.id === id);
                if (idx > -1) entries[idx] = entry;
                toast('Technique updated ✅');
            } else {
                entries.unshift(entry);
                toast('New technique logged! 🥋');
                
                const totalTech = entries.length;
                if (totalTech > 0 && totalTech % 50 === 0) {
                    const ci = BELT_ORDER.indexOf(currentBelt);
                    if (ci < BELT_ORDER.length - 1) {
                        currentBelt = BELT_ORDER[ci + 1];
                        toast(`🎉 Belt promoted to ${currentBelt.toUpperCase()}!`, 'info');
                        updateBeltIndicator();
                    }
                }
            }
            save(); resetForm(); renderEntries(); updateStats(); updateTechniqueDatalist();
        }

        function editEntry(id) {
            const e = entries.find(x => x.id === id);
            if (!e) return;
            document.getElementById('editId').value = e.id;
            document.getElementById('date').value = e.date;
            document.getElementById('category').value = e.category;
            document.getElementById('technique').value = e.technique;
            document.getElementById('notes').value = e.notes || '';
            document.getElementById('partner').value = e.partner || '';
            document.getElementById('videoLink').value = e.videoLink || '';
            currentRating = e.rating || 3;
            document.getElementById('ratingValue').value = currentRating;
            updateRatingUI(currentRating);
            document.getElementById('submitBtn').textContent = '💾 Update Technique';
            document.getElementById('submitBtn').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function deleteEntry(id) {
            if (!confirm('Delete this technique entry?')) return;
            entries = entries.filter(e => e.id !== id);
            save(); renderEntries(); updateStats(); toast('Entry deleted', 'info');
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('technique').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('partner').value = '';
            document.getElementById('videoLink').value = '';
            currentRating = 3;
            document.getElementById('ratingValue').value = '3';
            updateRatingUI(3);
            document.getElementById('submitBtn').textContent = '💾 Save Technique';
            document.getElementById('suggestions').style.display = 'none';
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view-toggle').forEach(b => b.classList.toggle('active', b.dataset.view === view));
            document.getElementById('entriesContainer').style.display = view === 'list' ? 'block' : 'none';
            document.getElementById('calendarView').style.display = view === 'calendar' ? 'block' : 'none';
            if (view === 'calendar') renderCalendar();
            else renderEntries();
        }

        function changeMonth(delta) {
            calendarDate.setMonth(calendarDate.getMonth() + delta);
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const title = document.getElementById('calendarTitle');
            grid.innerHTML = '';
            
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            title.textContent = calendarDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            
            ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => grid.innerHTML += `<div style="text-align:center;font-size:0.7rem;color:var(--text-muted);padding:4px;">${d}</div>`);
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toISOString().split('T')[0];
            
            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="calendar-day empty"></div>`;
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dayEntries = entries.filter(e => e.date === dateStr);
                const isToday = dateStr === todayStr;
                const isSelected = dateStr === selectedDateFilter;
                
                let dots = '';
                if (dayEntries.length > 0) {
                    const hasVideo = dayEntries.some(e => e.videoLink);
                    dots = `<div class="day-dots">${Array(Math.min(dayEntries.length, 5)).fill(`<div class="day-dot ${hasVideo ? 'has-video' : ''}"></div>`).join('')}</div><div class="day-count">${dayEntries.length}</div>`;
                }
                
                grid.innerHTML += `<div class="calendar-day ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}" onclick="selectCalendarDate('${dateStr}')"><div class="day-num">${d}</div>${dots}</div>`;
            }
        }

        function selectCalendarDate(dateStr) {
            selectedDateFilter = (selectedDateFilter === dateStr) ? null : dateStr;
            renderCalendar();
            switchView('list');
            renderEntries();
        }

        function clearDateFilter() {
            selectedDateFilter = null;
            renderEntries();
            if (currentView === 'calendar') renderCalendar();
        }

        function renderEntries() {
            const container = document.getElementById('entriesList');
            const empty = document.getElementById('emptyState');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            const activeFilter = document.querySelector('.chip.active')?.dataset.filter || 'all';
            
            let filtered = [...entries];
            if (selectedDateFilter) filtered = filtered.filter(e => e.date === selectedDateFilter);
            if (activeFilter === 'thisweek') {
                const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
                filtered = filtered.filter(e => new Date(e.date) >= weekAgo);
            } else if (activeFilter === 'favorites') {
                filtered = filtered.filter(e => e.rating >= 4);
            } else if (activeFilter !== 'all' && CATEGORIES[activeFilter]) {
                filtered = filtered.filter(e => e.category === activeFilter);
            }
            if (searchQuery) {
                filtered = filtered.filter(e => 
                    e.technique.toLowerCase().includes(searchQuery) ||
                    (e.notes && e.notes.toLowerCase().includes(searchQuery)) ||
                    (e.partner && e.partner.toLowerCase().includes(searchQuery))
                );
            }
            
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            if (filtered.length === 0) {
                empty.style.display = 'block';
                container.innerHTML = '';
                return;
            }
            empty.style.display = 'none';
            
            let html = selectedDateFilter ? `<div class="clear-filter" onclick="clearDateFilter()">← Show all entries</div>` : '';
            html += filtered.map(entry => {
                const cat = CATEGORIES[entry.category] || CATEGORIES.other;
                const dateObj = new Date(entry.date + 'T00:00:00');
                const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                const videoHtml = entry.videoLink ? `<a href="${escapeHtml(entry.videoLink)}" target="_blank" rel="noopener" class="video-link">🎥 Watch Video</a>` : '';
                
                return `
                <div class="card ${entry.category}" data-id="${entry.id}">
                    <div class="entry-header"><span class="entry-date">${dateStr}</span><span class="entry-category" style="background:${cat.color}20;color:${cat.color}">${cat.label}</span></div>
                    <div class="entry-title">${escapeHtml(entry.technique)}</div>
                    ${entry.notes ? `<div class="entry-notes">${escapeHtml(entry.notes)}</div>` : ''}
                    ${videoHtml}
                    <div class="entry-meta">
                        ${entry.partner ? `<span>🤝 ${escapeHtml(entry.partner)}</span>` : ''}
                        <span>⭐ ${'★'.repeat(entry.rating)}${'☆'.repeat(5-entry.rating)}</span>
                    </div>
                    <div class="entry-actions">
                        <button class="btn-sm btn-edit" onclick="editEntry('${entry.id}')" aria-label="Edit">✏️</button>
                        <button class="btn-sm btn-del" onclick="deleteEntry('${entry.id}')" aria-label="Delete">🗑️</button>
                    </div>
                </div>`;
            }).join('');
            container.innerHTML = html;
        }

        function updateStats() {
            const valid = entries.filter(e => !e.isDeleted);
            document.getElementById('totalSessions').textContent = [...new Set(valid.map(e => e.date))].length;
            document.getElementById('totalTechniques').textContent = valid.length;
            document.getElementById('avgRating').textContent = valid.length > 0 ? (valid.reduce((s, e) => s + (e.rating || 3), 0) / valid.length).toFixed(1) : '-';
        }

        function updateTechniqueDatalist() {
            const dl = document.getElementById('techniqueList');
            dl.innerHTML = [...new Set(entries.map(e => e.technique))].slice(0, 50).map(t => `<option value="${escapeHtml(t)}">`).join('');
        }

        function exportCSV() {
            if (entries.length === 0) return toast('No data to export', 'info');
            const headers = ['Date', 'Category', 'Technique', 'Notes', 'Partner', 'Rating (1-5)', 'Video Link'];
            let csv = '\uFEFF' + headers.join(',') + '\r\n';
            entries.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(e => {
                csv += [e.date, CATEGORIES[e.category]?.label, `"${(e.technique||'').replace(/"/g,'""')}"`, `"${(e.notes||'').replace(/"/g,'""')}"`, `"${(e.partner||'').replace(/"/g,'""')}"`, e.rating||3, `"${(e.videoLink||'').replace(/"/g,'""')}"`].join(',') + '\r\n';
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `BJJ_Training_Log_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            toast('Exported to CSV ✅');
        }

        function clearAllData() {
            if (!confirm('⚠️ Delete ALL training data? This cannot be undone.')) return;
            if (!confirm('Really? This will wipe your logs, belt progress, and settings.')) return;
            entries = []; currentBelt = 'white'; selectedDateFilter = null;
            save(); renderEntries(); updateStats(); updateBeltIndicator(); toast('All data cleared', 'info');
        }

        function save() { localStorage.setItem(KEY, JSON.stringify({ entries, belt: currentBelt, lastBackup: new Date().toISOString() })); }
        function escapeHtml(str) { if (!str) return ''; const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
        function toast(msg, type = 'success') { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show'; if (type !== 'success') t.classList.add(type); setTimeout(() => t.classList.remove('show'), 2800); }

        init();
    </script>
</body>
</html>
